
# ANI adapter — every 15 minutes
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ingestion-ani
  namespace: nyaya
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: ingestion
            adapter: ani
            tier: pipeline
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: ingestion
              image: ghcr.io/nyaya-platform/nyaya-ingestion:latest
              args: ["python", "-m", "ingestion.main", "--adapter", "ani"]
              envFrom:
                - configMapRef:
                    name: nyaya-config
                - secretRef:
                    name: nyaya-secrets
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
---
