  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: ingestion
            adapter: ncrb
            tier: pipeline
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: ingestion
              image: ghcr.io/nyaya-platform/nyaya-ingestion:latest
              args: ["python", "-m", "ingestion.main", "--adapter", "ncrb"]
              envFrom:
