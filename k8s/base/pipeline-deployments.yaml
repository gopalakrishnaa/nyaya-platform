
# Privacy Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: privacy-engine
  namespace: nyaya
  labels:
    app: privacy-engine
    tier: pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: privacy-engine
  template:
    metadata:
      labels:
        app: privacy-engine
        tier: pipeline
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: privacy-engine
          image: ghcr.io/nyaya-platform/nyaya-privacy-engine:latest
          ports:
            - containerPort: 8001
              name: metrics
          envFrom:
            - configMapRef:
                name: nyaya-config
            - secretRef:
                name: nyaya-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 3Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: model-cache
              mountPath: /root/.cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: model-cache
          emptyDir:
            sizeLimit: 2Gi
