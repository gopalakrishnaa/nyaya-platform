name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nyaya

jobs:
  python-quality:
    name: Python Quality (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            path: apps/api
          - service: privacy-engine
            path: services/privacy-engine
          - service: ai-extractor
            path: services/ai-extractor
          - service: entity-resolver
            path: services/entity-resolver
          - service: timeline-engine
            path: services/timeline-engine
          - service: persistence-worker
            path: services/persistence-worker
          - service: ingestion
            path: services/ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install tools
        run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check ${{ matrix.path }}/ || true
      - name: Ruff format check
        run: ruff format --check ${{ matrix.path }}/ || true

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nyaya_test
          POSTGRES_USER: nyaya
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install shared package
        run: pip install -e packages/shared-python/
      - name: Install API
        run: pip install -e apps/api/ pytest pytest-asyncio pytest-cov httpx
      - name: Run API tests
        env:
          DATABASE_URL: postgresql+asyncpg://nyaya:test@localhost:5432/nyaya_test
          REDIS_URL: redis://localhost:6379
          PRIVACY_SALT: test_salt_32chars_minimum_length1
          ANTHROPIC_API_KEY: test_key
          JWT_PUBLIC_KEY_PATH: /tmp/test_pub.pem
          JWT_PRIVATE_KEY_PATH: /tmp/test_priv.pem
        run: |
          cd apps/api
          pytest tests/ -v --cov=api --cov-report=xml || true

      - name: Install timeline-engine
        run: pip install -e services/timeline-engine/
      - name: Run timeline tests
        run: |
          cd services/timeline-engine
          pytest tests/ -v || true

      - name: Install privacy-engine
        run: pip install -e services/privacy-engine/
      - name: Run privacy-engine tests
        run: |
          cd services/privacy-engine
          pytest tests/ -v || true

  typescript-tests:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # version read from packageManager field in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Type check shared-types
        run: cd packages/shared-types && npx tsc --noEmit || true
      - name: Build shared-types
        run: cd packages/shared-types && npx tsc || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read        # CodeQL needs this to query workflow run metadata
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch || 'main' }}
          head: HEAD
          extra_args: --only-verified

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [python-quality]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: apps/api
          - service: privacy-engine
            context: services/privacy-engine
          - service: ai-extractor
            context: services/ai-extractor
          - service: entity-resolver
            context: services/entity-resolver
          - service: timeline-engine
            context: services/timeline-engine
          - service: persistence-worker
            context: services/persistence-worker
          - service: ingestion
            context: services/ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build, python-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy staging
        run: |
          echo "Deploying ${{ github.sha }} to staging"
          echo "kubectl apply -k k8s/overlays/staging"

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Run DB migrations
        run: |
          echo "kubectl run nyaya-migrate --image=${{ env.IMAGE_PREFIX }}/api:${{ github.ref_name }}"
          echo "  --restart=Never -- alembic upgrade head"
      - name: Deploy production
        run: |
          echo "kubectl apply -k k8s/overlays/prod"
